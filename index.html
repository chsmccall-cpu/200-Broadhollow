<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>200 Broadhollow Road Directory</title>

<!-- Force BrightSign + browser to always load latest version -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #e9edf3;
    color: #222;
    overflow: hidden;
}

/* HEADER */
.header {
    text-align: center;
    height: 10vh;
    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 3.2vw;
    font-weight: bold;
    letter-spacing: 2px;
    color: #2d2d5a;
}

/* DIRECTORY */
.directory {
    height: 82vh;
    padding: 0 2vw 2vh;

    display: grid;
    grid-template-columns: repeat(4, 1fr);
    column-gap: 2vw;
}

/* COLUMN */
.column {
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
}

/* ROW */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;

    font-size: 0.95vw;
    padding: 2px 0;
    border-bottom: 1px solid #ddd;
}

.row:nth-child(even) {
    background: rgba(0, 0, 0, 0.03);
}

/* TEXT */
.company {
    flex: 1;
    padding-right: 8px;
}

.suite {
    white-space: nowrap;
    font-weight: 600;
}

/* FOOTER */
.footer {
    position: relative; /* 👈 important */
    height: 8vh;
    background: #2f3c7e;
    color: white;

    display: flex;
    align-items: center;

    padding: 0 2vw;
    font-size: 0.9vw;

    border-top: 2px solid rgba(255,255,255,0.2);
}

.footer-left {
    position: absolute;
    left: 2vw;
}

.footer-right {
    position: absolute;
    right: 2vw;
}

.center-info {
    position: absolute;
    left: 50%;
    transform: translateX(-50%); /* 👈 TRUE CENTER */
    text-align: center;
}

/* CENTER INFO (weather + clock) */
.center-info {
    text-align: center;
    line-height: 1.2;
}

#weather {
    font-size: 0.9vw;
}

#clock {
    font-size: 0.8vw;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="header">
    200 BROADHOLLOW ROAD
</div>

<div id="directory" class="directory"></div>

<div class="footer">
    <div class="footer-left">
        Welcome to 200 Broadhollow Road
    </div>

    <div class="center-info">
        <div id="weather"></div>
        <div id="clock"></div>
    </div>

    <div class="footer-right">
        Leasing / Management Office 631-421-1000
    </div>
</div>

<script>

const sheetURL = "https://opensheet.elk.sh/1-LFIg-LOzalW4ymOKS_L7Gyqot3G6qZIjK12l8UWPa4/Sheet1";

/* DIRECTORY */
async function loadData() {
    try {
        const res = await fetch(sheetURL);
        let data = await res.json();
        renderData(data);
    } catch (err) {
        console.warn("Error loading sheet");
    }
}

function renderData(data) {
    data = data.filter(row => row.Company);
    data.sort((a, b) => a.Company.localeCompare(b.Company));

    const container = document.getElementById("directory");
    container.innerHTML = "";

    const perColumn = Math.ceil(data.length / 4);

    for (let i = 0; i < 4; i++) {
        const col = document.createElement("div");
        col.className = "column";

        data.slice(i * perColumn, (i + 1) * perColumn)
            .forEach(row => {
                const div = document.createElement("div");
                div.className = "row";

                div.innerHTML = `
                    <div class="company">${row.Company}</div>
                    <div class="suite">
                        ${row.Suite ? "Suite " + row.Suite : ""}
                    </div>
                `;

                col.appendChild(div);
            });

        container.appendChild(col);
    }
}

/* WEATHER + ICON */
function getWeatherIcon(desc) {
    desc = desc.toLowerCase();

    if (desc.includes("sun")) return "☀️";
    if (desc.includes("cloud")) return "☁️";
    if (desc.includes("rain")) return "🌧️";
    if (desc.includes("snow")) return "❄️";
    if (desc.includes("storm")) return "⛈️";
    if (desc.includes("fog")) return "🌫️";

    return "🌤️";
}

async function loadWeather() {
    try {
        const res = await fetch("https://wttr.in/Melville,NY?format=j1");
        const data = await res.json();

        const temp = data.current_condition[0].temp_F;
        const desc = data.current_condition[0].weatherDesc[0].value;
        const icon = getWeatherIcon(desc);

        document.getElementById("weather").innerHTML =
            `${icon} ${temp}°F • ${desc}`;
    } catch (err) {
        document.getElementById("weather").innerHTML = "";
    }
}

/* CLOCK */
function updateClock() {
    const now = new Date();

    const time = now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });

    const date = now.toLocaleDateString([], {
        weekday: 'short',
        month: 'short',
        day: 'numeric'
    });

    document.getElementById("clock").innerHTML = `${date} • ${time}`;
}

loadData();
loadWeather();
updateClock();

setInterval(loadData, 60000);
setInterval(loadWeather, 600000); // 10 min
setInterval(updateClock, 1000);   // every second

</script>

</body>
</html>
