<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>200 Broadhollow Road Directory</title>

<!-- Prevent caching -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #e9edf3;
    color: #222;
    overflow: hidden;
}

/* HEADER */
.header {
    position: relative;
    height: 14vh;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 3.0vw;
    font-weight: 600;
    letter-spacing: 2px;
    color: #1f2a44;
}

.title {
    display: flex;
    align-items: center;
    width: 90%;
}

.text {
    padding: 0 24px;
    white-space: nowrap;
    letter-spacing: 3px;
}

/* LINES */
.line {
    height: 2px;
    flex: 1;
}

.line.left {
    background: linear-gradient(to right, transparent, #2f3c7e);
}

.line.right {
    background: linear-gradient(to left, transparent, #2f3c7e);
}

/* DIRECTORY */
.directory {
    height: 78vh;
    padding: 0 2vw 2vh;

    display: grid;
    grid-template-columns: repeat(4, 1fr);
    column-gap: 2vw;
}

/* COLUMN */
.column {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* ROW */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;

    font-size: var(--row-size, 0.95vw); /* 👈 smaller */
    padding: 4px 0; /* 👈 more breathing room */
    line-height: 1.3; /* 👈 improved readability */

    border-bottom: 1px solid #ddd;
}

.row:nth-child(even) {
    background: rgba(0, 0, 0, 0.03);
}

/* TEXT */
.company {
    flex: 1;
    padding-right: 8px;
    font-weight: 500;
}

/* SUB */
.sub {
    font-size: 0.7em;
    color: #2f3c55;
    margin-top: 2px; /* 👈 more spacing */
    line-height: 1.2;
}

/* SUITE */
.suite {
    white-space: nowrap;
    font-weight: 700;
    letter-spacing: 0.3px;
}

/* FOOTER */
.footer {
    position: relative;
    height: 8vh;
    background: #2f3c7e;
    color: white;

    display: flex;
    align-items: center;

    padding: 0 2vw;
    font-size: 0.85vw; /* 👈 slightly smaller */

    border-top: 2px solid rgba(255,255,255,0.2);
}

/* Footer layout */
.footer-left {
    position: absolute;
    left: 2vw;
}

.footer-right {
    position: absolute;
    right: 2vw;
}

.center-info {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

#weather {
    font-size: 0.85vw;
}

#clock {
    font-size: 0.75vw;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="header">
    <div class="title">
        <span class="line left"></span>
        <span class="text">200 BROADHOLLOW ROAD</span>
        <span class="line right"></span>
    </div>
</div>

<div id="directory" class="directory"></div>

<div class="footer">
    <div class="footer-left">
        Welcome to 200 Broadhollow Road
    </div>

    <div class="center-info">
        <div id="weather">Loading weather...</div>
        <div id="clock"></div>
    </div>

    <div class="footer-right">
        Leasing / Management Office: (631) 421-1000
    </div>
</div>

<script>

const sheetURL = "https://opensheet.elk.sh/1-LFIg-LOzalW4ymOKS_L7Gyqot3G6qZIjK12l8UWPa4/Sheet1";

/* DIRECTORY */
async function loadData() {
    try {
        const res = await fetch(sheetURL);
        let data = await res.json();
        renderData(data);
    } catch (err) {
        console.warn("Error loading sheet");
    }
}

function renderData(data) {
    data = data.filter(row => row.Company);
    data.sort((a, b) => a.Company.localeCompare(b.Company));

    const container = document.getElementById("directory");
    container.innerHTML = "";

    const perColumn = Math.ceil(data.length / 4);

    for (let i = 0; i < 4; i++) {
        const col = document.createElement("div");
        col.className = "column";

        data.slice(i * perColumn, (i + 1) * perColumn)
            .forEach(row => {
                const div = document.createElement("div");
                div.className = "row";

                div.innerHTML = `
                    <div class="company">
                        ${row.Company}
                        ${row.Sub ? `<div class="sub">${row.Sub.replace(/\n/g, "<br>")}</div>` : ""}
                    </div>
                    <div class="suite">
                        ${row.Suite ? "Suite " + row.Suite : ""}
                    </div>
                `;

                col.appendChild(div);
            });

        container.appendChild(col);
    }

    setTimeout(autoFitText, 50);
}

/* AUTO-FIT */
function autoFitText() {
    const container = document.getElementById("directory");
    let size = 0.95;

    function fits() {
        return container.scrollHeight <= container.clientHeight;
    }

    function applySize() {
        document.documentElement.style.setProperty('--row-size', size + 'vw');
    }

    applySize();

    while (!fits() && size > 0.6) {
        size -= 0.02;
        applySize();
    }
}

/* WEATHER */
async function loadWeather() {
    try {
        const res = await fetch("https://wttr.in/Melville,NY?format=j1");
        const data = await res.json();

        const temp = data.current_condition[0].temp_F;
        const desc = data.current_condition[0].weatherDesc[0].value;

        document.getElementById("weather").innerHTML =
            `${temp}°F • ${desc}`;
    } catch (err) {
        document.getElementById("weather").innerHTML = "";
    }
}

/* CLOCK */
function updateClock() {
    const now = new Date();

    const time = now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });

    const date = now.toLocaleDateString([], {
        weekday: 'short',
        month: 'short',
        day: 'numeric'
    });

    document.getElementById("clock").innerHTML = `${date} • ${time}`;
}

/* AUTO RELOAD */
setInterval(() => {
    location.reload(true);
}, 3 * 60 * 60 * 1000);

loadData();
loadWeather();
updateClock();

setInterval(loadData, 60000);
setInterval(loadWeather, 600000);
setInterval(updateClock, 1000);

</script>

</body>
</html>
