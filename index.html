<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>200 Broadhollow Road Directory</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
    color: #222;
    overflow: hidden; /* 🚨 prevents scrolling */
}

/* HEADER */
.header {
    text-align: center;
    height: 10vh;
    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 3.2vw;
    font-weight: bold;
    letter-spacing: 2px;
    color: #2d2d5a;
}

/* DIRECTORY AREA */
.directory {
    height: 82vh;
    padding: 0 2vw 2vh; /* ⬅️ added bottom padding */
    
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    column-gap: 2vw;
}

/* COLUMN */
.column {
    display: flex;
    flex-direction: column;
    justify-content: space-evenly; /* 🚨 evenly fills height */
}

/* ROW */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;

    font-size: 0.95vw; /* 🚨 auto scales with screen */
    padding: 2px 0;
    border-bottom: 1px solid #ddd;
}

/* TEXT */
.company {
    flex: 1;
    padding-right: 8px;
}

.suite {
    white-space: nowrap;
    font-weight: 600;
}

/* FOOTER */
.footer {
    height: 8vh;
    background: #2f3c7e;
    color: white;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 2vw;
    font-size: 0.9vw;

    border-top: 2px solid rgba(255,255,255,0.2); /* 👈 add this */
}
</style>
</head>

<body>

<div class="header">
    200 BROADHOLLOW ROAD
</div>

<div id="directory" class="directory"></div>

<div class="footer">
    <div>Welcome to 200 Broadhollow Road</div>
    <div>Leasing / Management Office 631-421-1000</div>
</div>

<script>

const sheetURL = "https://opensheet.elk.sh/1-LFIg-LOzalW4ymOKS_L7Gyqot3G6qZIjK12l8UWPa4/Sheet1";

async function loadData() {
    try {
        const res = await fetch(sheetURL);
        let data = await res.json();
        renderData(data);
    } catch (err) {
        console.warn("Error loading sheet");
    }
}

function renderData(data) {
    data = data.filter(row => row.Company);
    data.sort((a, b) => a.Company.localeCompare(b.Company));

    const container = document.getElementById("directory");
    container.innerHTML = "";

    // 🔥 split into 4 equal columns
    const perColumn = Math.ceil(data.length / 4);

    for (let i = 0; i < 4; i++) {
        const col = document.createElement("div");
        col.className = "column";

        data.slice(i * perColumn, (i + 1) * perColumn)
            .forEach(row => {
                const div = document.createElement("div");
                div.className = "row";

                div.innerHTML = `
                    <div class="company">${row.Company}</div>
                    <div class="suite">Suite ${row.Suite}</div>
                `;

                col.appendChild(div);
            });

        container.appendChild(col);
    }
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
