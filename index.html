<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>200 Broadhollow Road Directory</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden; /* 🚨 critical */
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
    color: #222;
}

/* HEADER */
.header {
    text-align: center;
    height: 120px;
    line-height: 120px;
    font-size: 54px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #2d2d5a;
}

/* DIRECTORY AREA */
.directory {
    height: 820px; /* 🔥 locks content area */
    column-count: 4;
    column-gap: 50px;
    padding: 0 60px;
    overflow: hidden; /* 🚨 prevents spill */
}

/* ROW */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;

    font-size: 20px; /* slightly smaller to guarantee fit */
    line-height: 1.3;

    padding: 4px 0;
    border-bottom: 1px solid #ddd;

    break-inside: avoid;
}

/* TEXT */
.company {
    flex: 1;
    padding-right: 10px;
}

.suite {
    width: 90px;
    text-align: right;
    white-space: nowrap;
    font-weight: 600;
}

/* FOOTER */
.footer {
    height: 140px;
    background: #2f3c7e;
    color: white;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 50px;
    font-size: 22px;
}
</style>
</head>

<body>

async function loadData() {
    try {
        const res = await fetch(sheetURL);
        let data = await res.json();
        renderData(data);
    } catch (err) {
        console.warn("Using sample data");
        renderData(sampleData);
    }
}

function renderData(data) {
    data = data.filter(row => row.Company);
    data.sort((a, b) => a.Company.localeCompare(b.Company));

    const container = document.getElementById("directory");
    container.innerHTML = "";

    data.forEach(row => {
        const div = document.createElement("div");
        div.className = "row";

        div.innerHTML = `
            <div class="company">${row.Company}</div>
            <div class="suite">Suite ${row.Suite || ""}</div>
        `;

        container.appendChild(div);
    });

    setTimeout(scaleToFit, 50);
}

/* 🔥 AUTO SCALE FUNCTION */
function scaleToFit() {
    const content = document.querySelector(".content");

    const scale = Math.min(
        1920 / content.scrollWidth,
        1080 / content.scrollHeight
    );

    content.style.transform = `scale(${scale})`;
}

loadData();
setInterval(loadData, 60000);

</script>
